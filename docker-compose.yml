services:


   backend-blue:
      build: ./backend
      container_name: backend-blue

   backend-green:
      build: ./backend
      container_name: backend-green


   frontend:
      build: ./frontend
      container_name: frontend

   nginx:
      image: nginx:latest
      container_name: nginx
      ports:
        - "80:80"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      depends_on:
        - backend-blue
        - backend-green
        - frontend
