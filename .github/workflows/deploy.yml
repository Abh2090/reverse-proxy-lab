name: Deploy Blue-Green


on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |

          cd ~/reverse-proxy-lab

          #Pull latest code
          git pull origin main
          
          #Rebuild green
          docker-compose up -d
          if grep -q "backend-blue" nginx/default.conf; then
             CURRENT="blue"
             TARGET="green"
          else
             CURRENT="green"
             TARGET="blue"
          fi

          echo "Current: $CURRENT"
          echo "Deploying: $TARGET"
          docker-compose build backend-$TARGET
          docker-compose up -d backend-$TARGET

          sleep 5
          docker exec backend-green curl localhost:5000/api || exit 1
          #Switch nginx to GREEN
          sed -i 's/backend-blue/backend-green/' nginx/default.conf

          docker exec nginx nginx -s reload
